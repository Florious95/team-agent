version: 1
team:
  name: "teamspec-full-example"
  mode: "supervisor_worker"
  objective: "Build, research, review, and document a code change with Codex CLI workers."
  workspace: "."
leader:
  id: "leader"
  role: "leader"
  provider: "codex"
  model: null
  tools:
    - "fs_read"
    - "fs_list"
    - "mcp_team"
    - "provider_builtin"
  context_policy:
    keep_user_thread: true
    receive_worker_outputs: "structured_only"
    max_worker_result_tokens: 4000
agents:
  - id: "codex_implementer"
    role: "implementation_engineer"
    provider: "codex"
    model: null
    working_directory: "."
    system_prompt:
      inline: |
        You are the implementation worker. Make focused code changes, run relevant tests,
        and report a result_envelope_v1 with changed files, tests, risks, artifacts, and next actions.
      file: null
    tools:
      - "fs_read"
      - "fs_write"
      - "fs_list"
      - "execute_bash"
      - "git_diff"
      - "mcp_team"
      - "provider_builtin"
    permission_mode: "restricted"
    preferred_for:
      - "implementation"
      - "bug_fix"
      - "test"
    avoid_for:
      - "final_risk_signoff"
    output_contract:
      format: "result_envelope_v1"
      required_fields:
        - "task_id"
        - "status"
        - "summary"
        - "artifacts"
  - id: "codex_researcher"
    role: "researcher"
    provider: "codex"
    model: null
    working_directory: "."
    system_prompt:
      inline: |
        You are the research worker. Prefer read-only analysis and summarize findings
        as result_envelope_v1. Do not edit files.
      file: null
    tools:
      - "fs_read"
      - "fs_list"
      - "network"
      - "mcp_team"
      - "provider_builtin"
    permission_mode: "restricted"
    preferred_for:
      - "research"
      - "architecture"
      - "docs"
    avoid_for:
      - "implementation"
    output_contract:
      format: "result_envelope_v1"
      required_fields:
        - "task_id"
        - "status"
        - "summary"
        - "artifacts"
  - id: "codex_reviewer"
    role: "code_reviewer"
    provider: "codex"
    model: null
    working_directory: "."
    system_prompt:
      inline: |
        You are the reviewer. Find correctness, regression, security, and missing-test risks.
        Stay read-only unless the leader explicitly changes your permissions.
      file: null
    tools:
      - "fs_read"
      - "fs_list"
      - "git_diff"
      - "mcp_team"
      - "provider_builtin"
    permission_mode: "restricted"
    preferred_for:
      - "review"
      - "risk_check"
    avoid_for:
      - "implementation"
    output_contract:
      format: "result_envelope_v1"
      required_fields:
        - "task_id"
        - "status"
        - "summary"
        - "artifacts"
routing:
  default_assignee: "leader"
  rules:
    - id: "implementation-to-codex"
      when: "task.type in [\"implementation\", \"bug_fix\", \"test\"]"
      assign_to: "codex_implementer"
      priority: 100
    - id: "research-to-codex"
      when: "task.type in [\"research\", \"architecture\", \"docs\"]"
      assign_to: "codex_researcher"
      priority: 90
    - id: "review-to-codex"
      when: "task.type in [\"review\", \"risk_check\"]"
      assign_to: "codex_reviewer"
      priority: 90
communication:
  protocol: "mcp_inbox"
  topology: "leader_centered"
  worker_to_worker: false
  ack_timeout_sec: 60
  result_format: "result_envelope_v1"
  message_store:
    sqlite: ".team/runtime/team.db"
    mirror_files: ".team/messages"
runtime:
  backend: "tmux"
  display_backend: "none"
  session_name: "teamspec-full-example"
  auto_launch: true
  require_user_approval_before_launch: true
  dangerous_auto_approve: false
  max_active_agents: 3
  startup_order:
    - "codex_implementer"
    - "codex_researcher"
    - "codex_reviewer"
context:
  state_file: "team_state.md"
  artifact_dir: ".team/artifacts"
  log_dir: ".team/logs"
  summarization:
    worker_full_logs: "retain_outside_leader_context"
    state_update: "after_each_result"
tasks:
  - id: "task_research"
    title: "Read the task context and identify design risks."
    type: "research"
    assignee: null
    deps: []
    acceptance:
      - "Result envelope includes summary and risks."
    status: "pending"
    requires_tools:
      - "fs_read"
    files:
      - "**/*"
    risk: "medium"
    retry_limit: 1
    human_confirmation: false
  - id: "task_impl"
    title: "Implement the requested code change and run tests."
    type: "implementation"
    assignee: null
    deps:
      - "task_research"
    acceptance:
      - "Changed files and tests are reported."
    status: "pending"
    requires_tools:
      - "fs_write"
      - "execute_bash"
    files:
      - "src/**"
      - "tests/**"
    risk: "medium"
    retry_limit: 1
    human_confirmation: false
  - id: "task_review"
    title: "Review implementation output and identify regressions."
    type: "review"
    assignee: null
    deps:
      - "task_impl"
    acceptance:
      - "Findings are structured with risk and artifacts."
    status: "pending"
    requires_tools:
      - "fs_read"
      - "git_diff"
    files:
      - "**/*"
    risk: "medium"
    retry_limit: 0
    human_confirmation: false
