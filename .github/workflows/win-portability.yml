name: win-portability

# 0.5.x Windows portability CI.
#
# - Ubuntu job: primary green-required. Runs platform lib tests +
#   C-1 packaging assertion + C-2 fallback burn-down + C-4 caller
#   whitelist guard.
# - Windows compile-gate job: continue-on-error. `cargo check
#   --target x86_64-pc-windows-msvc` is expected RED in Batch 0;
#   Batches 1-4 burn the error count down. Upload check.log so we
#   can measure the burn-down.
#
# Truth source:
# - Design:    .team/artifacts/0.5.x-windows-portability-survey-design.md
# - CR verdict: .team/artifacts/0.5.x-windows-portability-cr-verdict.md

on:
  workflow_dispatch:
  push:
    branches: [feat/win-portability]

jobs:
  lib-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: platform lib tests
        run: cargo test -p team-agent --lib platform::
      - name: c-1 packaging PreviewCompileOnly assertion
        run: cargo test -p team-agent --lib packaging::tests::windows_x8664
      - name: c-2 fallback burndown grep guards
        run: cargo test -p team-agent --test platform_fallback_burndown_batch0
      - name: c-4 caller-whitelist grep guard
        run: cargo test -p team-agent --test platform_process_caller_whitelist_batch0

  windows-compile-gate:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: cargo check --target x86_64-pc-windows-msvc (RED expected in Batch 0)
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cargo check --target x86_64-pc-windows-msvc -p team-agent --lib --bin team-agent 2>&1 | tee check.log
          echo "cargo_check_exit=$?"
      - name: post burn-down summary
        shell: bash
        run: |
          if [ -f check.log ]; then
            errcount=$(grep -c "^error\[" check.log || echo 0)
            echo "windows-portability-tracking git_rev=$(git rev-parse HEAD)"
            echo "windows-portability-tracking build_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "windows-portability-tracking cargo_check_error_count=$errcount"
            {
              echo "git_rev=$(git rev-parse HEAD)"
              echo "build_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "cargo_check_error_count=$errcount"
              echo ""
              echo "# First 20 error headers (burn-down evidence)"
              grep "^error\[" check.log | head -20 || true
            } > win-portability-tracking.txt
            {
              echo "## Windows portability compile-gate burn-down"
              echo ""
              echo "- error count: $errcount"
            } >> $GITHUB_STEP_SUMMARY
          else
            echo "status=no_check_log" > win-portability-tracking.txt
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: win-portability-tracking
          path: |
            win-portability-tracking.txt
            check.log
          if-no-files-found: warn
