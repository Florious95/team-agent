name: win-portability

on:
  workflow_dispatch:
  push:
    branches: [feat/win-portability]

jobs:
  lib-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: platform lib tests via cargo test (rustup default toolchain)
        run: cargo test -p team-agent --lib platform::
