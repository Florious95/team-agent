name: win-conpty-phase1

# Phase 1 landing verification.
#
# - Ubuntu job: build + run the new `conpty::` lib tests, the C-1
#   pipe_token grep guard, and the end-to-end fake-worker integration
#   test on a stock Linux runner. Six §Phase 1 acceptance bullets are
#   exercised at the trait layer via the LocalShimPipeClient +
#   FakePaneRuntime seam (all portable, no Windows needed).
# - Windows job: build BOTH the Phase 0 proof binary (regression
#   guard so its hermetic sha never silently drifts) AND the new
#   `windows-shim` binary. Both are uploaded with a per-binary
#   C-4 tracking record.

on:
  workflow_dispatch:
  push:
    branches: [feat/win-conpty-phase1]

jobs:
  lib-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: focused conpty lib tests
        run: cargo test -p team-agent --lib conpty
      - name: c-1 grep guard
        run: cargo test -p team-agent --test conpty_pipe_token_no_persist_guard
      - name: end-to-end fake-worker (Phase 1 six-bullet at trait layer)
        run: cargo test -p team-agent --test conpty_end_to_end_fake_worker

  windows-binaries:
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: build phase 0 binary (Phase 1 regression guard)
        run: cargo build -p win-conpty-phase0 --bin win-conpty-phase0 --release --target x86_64-pc-windows-msvc
      - name: build windows-shim binary (Phase 1b)
        run: cargo build -p win-conpty-phase0 --bin windows-shim --release --target x86_64-pc-windows-msvc
      - name: build conpty-cli binary (Phase 1c)
        run: cargo build -p win-conpty-phase0 --bin conpty-cli --release --target x86_64-pc-windows-msvc
      - name: c-4 tracking
        shell: pwsh
        run: |
          $rev = git rev-parse HEAD
          $ts  = (Get-Date).ToString("o")
          $phase0Exe = "target\x86_64-pc-windows-msvc\release\win-conpty-phase0.exe"
          $shimExe   = "target\x86_64-pc-windows-msvc\release\windows-shim.exe"
          $cliExe    = "target\x86_64-pc-windows-msvc\release\conpty-cli.exe"
          $phase0Sha = (Get-FileHash $phase0Exe -Algorithm SHA256).Hash
          $shimSha   = (Get-FileHash $shimExe   -Algorithm SHA256).Hash
          $cliSha    = (Get-FileHash $cliExe    -Algorithm SHA256).Hash
          Write-Host "phase0-tracking git_rev=$rev"
          Write-Host "phase0-tracking build_timestamp=$ts"
          Write-Host "phase0-tracking binary_sha256=$phase0Sha"
          Write-Host "shim-tracking git_rev=$rev"
          Write-Host "shim-tracking build_timestamp=$ts"
          Write-Host "shim-tracking binary_sha256=$shimSha"
          Write-Host "cli-tracking git_rev=$rev"
          Write-Host "cli-tracking build_timestamp=$ts"
          Write-Host "cli-tracking binary_sha256=$cliSha"
          Add-Content -Path phase0-tracking.txt -Value "git_rev=$rev"
          Add-Content -Path phase0-tracking.txt -Value "build_timestamp=$ts"
          Add-Content -Path phase0-tracking.txt -Value "binary_sha256=$phase0Sha"
          Add-Content -Path shim-tracking.txt -Value "git_rev=$rev"
          Add-Content -Path shim-tracking.txt -Value "build_timestamp=$ts"
          Add-Content -Path shim-tracking.txt -Value "binary_sha256=$shimSha"
          Add-Content -Path cli-tracking.txt -Value "git_rev=$rev"
          Add-Content -Path cli-tracking.txt -Value "build_timestamp=$ts"
          Add-Content -Path cli-tracking.txt -Value "binary_sha256=$cliSha"
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-conpty-phase1-binaries
          path: |
            target/x86_64-pc-windows-msvc/release/win-conpty-phase0.exe
            target/x86_64-pc-windows-msvc/release/windows-shim.exe
            target/x86_64-pc-windows-msvc/release/conpty-cli.exe
            phase0-tracking.txt
            shim-tracking.txt
            cli-tracking.txt
