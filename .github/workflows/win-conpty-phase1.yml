name: win-conpty-phase1

# Phase 1a landing verification:
#
# - Ubuntu job: build + run the new `conpty::` lib tests + the C-1
#   pipe_token grep guard on a stock Linux runner (proves the module
#   compiles and passes on non-Windows hosts, satisfying the design
#   §Acceptance "existing macOS/Linux tmux E2E remains unchanged"
#   invariant since the ConPtyBackend degrades to typed MuxUnavailable
#   without a shim).
# - Windows job: build the win-conpty-phase0 proof binary (kept green
#   across Phase 1 so the Phase 0 hermetic sha never regresses) and
#   emit the C-4 tracking header.

on:
  workflow_dispatch:
  push:
    branches: [feat/win-conpty-phase1]

jobs:
  lib-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: focused conpty lib tests
        run: cargo test -p team-agent --lib conpty
      - name: c-1 grep guard
        run: cargo test -p team-agent --test conpty_pipe_token_no_persist_guard

  windows-phase0-proof:
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: build phase 0 binary (Phase 1 regression guard)
        run: cargo build -p win-conpty-phase0 --release --target x86_64-pc-windows-msvc
      - name: c-4 tracking
        shell: pwsh
        run: |
          $exe = "target\x86_64-pc-windows-msvc\release\win-conpty-phase0.exe"
          $rev = git rev-parse HEAD
          $ts  = (Get-Date).ToString("o")
          $sha = (Get-FileHash $exe -Algorithm SHA256).Hash
          Write-Host "phase0-tracking git_rev=$rev"
          Write-Host "phase0-tracking build_timestamp=$ts"
          Write-Host "phase0-tracking binary_sha256=$sha"
          Add-Content -Path phase0-tracking.txt -Value "git_rev=$rev"
          Add-Content -Path phase0-tracking.txt -Value "build_timestamp=$ts"
          Add-Content -Path phase0-tracking.txt -Value "binary_sha256=$sha"
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-conpty-phase0
          path: |
            target/x86_64-pc-windows-msvc/release/win-conpty-phase0.exe
            phase0-tracking.txt
